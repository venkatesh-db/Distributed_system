
version: "3.9"

services:

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14268:14268"

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - user-service

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - order-service

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"